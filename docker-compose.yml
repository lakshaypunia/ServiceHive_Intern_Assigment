services:
  # ── MongoDB ─────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: smart-leads-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-leads-net

  # ── Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-leads-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smart-leads
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: http://localhost
    depends_on:
      - mongo
    networks:
      - smart-leads-net

  # ── Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: smart-leads-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smart-leads-net

volumes:
  mongo_data:

networks:
  smart-leads-net:
    driver: bridge
